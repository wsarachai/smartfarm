services:
  web-server:
    build: .
    image: wsarachai/smartfarm-web-server:latest
    container_name: smartfarm-web-server
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      CAMERA_MAX_FRAME_BYTES: 2097152
      CAMERA_STALE_MS: 15000
      # Source for the live MJPEG proxy (GET /api/v1/camera/live). The server
      # pulls this and fans it out to viewers. Set to the camera's own stream.
      CAMERA_STREAM_URL: http://192.168.0.3:81/stream

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

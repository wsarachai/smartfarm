services:
  web-server:
    build:
      context: .
      # Build metadata baked into the client bundle (shown on Settings > About).
      # Sourced from host env — set by the deploy wrapper (`npm run deploy`) or a
      # one-liner; a plain `docker compose up --build` leaves them empty and the
      # bundle falls back to dev/unknown + build clock. See CLAUDE.md.
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-}
        GIT_SHA: ${GIT_SHA:-}
        BUILD_DATE: ${BUILD_DATE:-}
    image: wsarachai/smartfarm-web-server:latest
    container_name: smartfarm-web-server
    restart: unless-stopped

    # Shared bridge so the AI inference container can reach this server by name
    # (http://web-server:3000) to pull camera frames. The AI service lives in the
    # docker-compose.ai.yaml overlay (Jetson-only: it needs runtime: nvidia).
    networks:
      - smartfarm-net

    ports:
      - "3000:3000"

    # Camera config + dashboard settings persist here. Host-mounted so they
    # survive container recreation; the server writes them atomically on edits.
    volumes:
      - ./data:/data

    environment:
      NODE_ENV: production
      PORT: 3000
      CAMERA_MAX_FRAME_BYTES: 2097152
      # v2 duty-cycle: the camera pushes one frame every CAMERA_SNAPSHOT_INTERVAL_MS
      # (this is the seed default; the persisted config file takes over once written).
      # Liveness "stale" is derived as interval x CAMERA_STALE_FACTOR (see camera.js).
      CAMERA_SNAPSHOT_INTERVAL_MS: 60000
      CAMERA_STALE_FACTOR: "2.5"
      CAMERA_RING_SIZE: 90
      CAMERA_CONFIG_PATH: /data/camera-config.json

      # Dashboard settings (camera source + pump), server-owned + persisted.
      # These seed data/settings.json on first boot; the persisted file takes
      # over once written (edited from the Settings page).
      SETTINGS_PATH: /data/settings.json
      # Pump target the relay commands. Set to the actually-deployed node
      # (pump-zone-esp01 uses a static 192.168.0.5).
      PUMP_URL: http://192.168.0.5
      PUMP_LABEL: Main Pump
      PUMP_AUTO_OFF_MINUTES: 5
      # Camera source prefs (where the browser reads live/snapshot frames).
      CAMERA_SOURCE_MODE: relay
      CAMERA_STREAM_URL: http://192.168.0.3:81/stream
      CAMERA_SNAPSHOT_URL: /api/v1/camera/frame.jpg

      # AI decision service (smartfarm-ai container on the shared net). Water
      # stress + canopy delegate their decisions here; unreachable → "AI offline".
      AI_SERVICE_URL: http://smartfarm-ai:8000/water-stress
      CANOPY_SERVICE_URL: http://smartfarm-ai:8000/canopy
      DISEASE_SERVICE_URL: http://smartfarm-ai:8000/disease

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  # Explicit name (not the default project-prefixed one) so the AI overlay can
  # attach to it as an EXTERNAL network and be brought up/down independently:
  #   docker compose -f docker-compose.yaml up -d       # creates smartfarm-net
  #   docker compose -f docker-compose.ai.yaml up -d    # attaches to it
  smartfarm-net:
    name: smartfarm-net
    driver: bridge

# AI inference overlay — Jetson-only (needs the NVIDIA container runtime).
#
# Kept out of the base compose so a plain `docker compose up` still works on a
# dev PC (which has no `runtime: nvidia`). Run alongside the base ON THE JETSON:
#
#   docker compose -f docker-compose.yaml -f docker-compose.ai.yaml up
#
# The AI container pulls camera frames from the web-server over the shared
# network by service name (http://web-server:3000/api/v1/camera/frame.jpg),
# using ETag/304 to only infer on new frames. No SD-card frame files are written.
# See docs/ai-frame-pull.md for the pull contract + the ai-example/ artifacts.
services:
  ai:
    # The prebuilt NVIDIA DLI "AI on Jetson Nano" image (JupyterLab + PyTorch/
    # torchvision/jetcam, Python 3.6) — develop the model interactively.
    image: nvcr.io/nvidia/dli/dli-nano-ai:v2.0.2-r32.7.1
    container_name: smartfarm-ai
    runtime: nvidia
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - smartfarm-net
    ports:
      - "8888:8888" # JupyterLab (default password: dlinano)
    environment:
      # Base URL the reference notebook/poller pulls frames from — the web-server
      # service name on the shared bridge, so there's no host-IP coupling.
      WEB_SERVER_URL: http://web-server:3000
      POLL_SECONDS: "5"
    volumes:
      # Reference notebook + poller appear in JupyterLab under data/smartfarm.
      - ./ai-example:/nvdli-nano/data/smartfarm

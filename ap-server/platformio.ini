; ap-server — ESP-WROOM-32 SoftAP + DHCP + live status page — v1
; Board: generic ESP32 Dev Module (ESP-WROOM-32 / ESP32-D0WDQ6).
; Mirrors the AP + DHCP behavior of ../esp-idf-iot/web-server, re-implemented
; on the Arduino framework (to match ../esp32cam conventions).
; See README.md for the design decisions behind these settings.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Auto-detect the board's serial port. Pin these once you know the COM port
; (check with: pio device list) if auto-detect ever grabs the wrong device:
upload_port = COM9
monitor_port = COM9

; Decode stack traces into file:line on crash, and timestamp each line.
monitor_filters = esp32_exception_decoder, time

build_flags =
    ; Quieter core logs; bump to 3 (INFO) while debugging.
    -DCORE_DEBUG_LEVEL=1

; ESP32-CAM IP Camera (AI-Thinker) — v1
; Board: AI-Thinker ESP32-CAM, flashed via ESP32-CAM-MB (CH340G) micro-USB.
; See README.md for the full design decisions behind these settings.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; v2: config pull + telemetry use ArduinoJson to parse the hub's /config response.
lib_deps =
    bblanchon/ArduinoJson@^7.0.0

; Board's CH340 serial port. If Windows reassigns it later, update both lines
; (check with: pio device list). Comment these out to let PlatformIO auto-detect.
upload_port = COM4
monitor_port = COM4

; ESP32-CAM-MB (CH340): don't assert DTR/RTS when the monitor opens. On this
; carrier those lines drive EN/IO0, so the default assertion can hold the board
; in reset or download mode — the monitor then shows nothing. Keeping them
; deasserted lets the flashed sketch actually run.
monitor_rts = 0
monitor_dtr = 0

; Decode stack traces into file:line on crash, and timestamp each line.
monitor_filters = esp32_exception_decoder, time

; Dual ~1.9 MB app slots (app0/app1) so firmware can be updated over the air.
board_build.partitions = min_spiffs.csv

build_flags =
    ; Selects the correct camera pin map for the AI-Thinker board.
    -DCAMERA_MODEL_AI_THINKER
    ; NOTE: the camera *module* (OV3660 vs RHYX M21-45) is chosen by editing the
    ; selector block at the top of src/camera_module.h — NOT here. Leaving it out
    ; of the default build flags is deliberate so that header macro decides.
    ; Quieter core logs; bump to 3 (INFO) while debugging.
    -DCORE_DEBUG_LEVEL=1

; --- RHYX M21-45 module (optional CLI shortcut) --------------------------------
; You normally pick the module in src/camera_module.h and build `-e esp32cam`.
; This env is just a convenience so you can force the RHYX M21-45 (GC2145)
; profile from the command line without touching the header — the build flag
; overrides the header's selector. The RHYX is a GC2145, which has NO hardware
; JPEG encoder, so this profile captures RGB565 and compresses in software.
; See src/camera_module.h and README.md.
;
; Usage:  pio run -e esp32cam_rhyx -t upload
[env:esp32cam_rhyx]
extends = env:esp32cam
build_flags =
    -DCAMERA_MODEL_AI_THINKER
    -DCAMERA_MODULE_RHYX_M21_45
    -DCORE_DEBUG_LEVEL=1

; --- Wireless (OTA) upload -----------------------------------------------------
; Usage:  pio run -e esp32cam_ota -t upload      (no USB cable needed)
; Requires the machine running this to be on the same WiFi/LAN as the camera,
; and the firmware already on the board to be OTA-capable (flash once via USB).
; The --auth password MUST match OTA_PASSWORD in include/secrets.h.
[env:esp32cam_ota]
extends = env:esp32cam
upload_protocol = espota
upload_port = 192.168.1.3
upload_flags = --auth=password

; OTA counterpart for a board fitted with the RHYX M21-45 module.
[env:esp32cam_rhyx_ota]
extends = env:esp32cam_rhyx
upload_protocol = espota
upload_port = 192.168.1.3
upload_flags = --auth=password

; sensor-zone — ESP-WROOM-32 farm-zone sensor node — v1
; Board: generic ESP32 Dev Module (ESP-WROOM-32 / ESP32-D0WDQ6).
; ESP-IDF port of ../esp-idf-iot/sensor-node, mapped to a single farm zone.
; See README.md for the design decisions behind these settings.

; env:esp32dev — ESP-WROOM-32 sensor node, ESP-IDF via pioarduino (IDF 5.3.x)
; We use the pioarduino fork (not the stock espressif32 platform) because the
; ported source needs IDF >= 5.2 for the new ADC oneshot API constant
; ADC_ATTEN_DB_12. Tag 53.03.13 == Arduino core 3.1.3 based on IDF 5.3.2.
[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32.git#53.03.13
framework = espidf
board = esp32dev
monitor_speed = 115200
board_build.flash_size = 4MB
; sdkconfig.defaults is picked up automatically

; env:native — host-side Unity unit tests for pure logic (Test teammate owns test/)
[env:native]
platform = native
test_framework = unity

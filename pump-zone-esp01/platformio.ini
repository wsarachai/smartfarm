; pump-zone-esp01 — ESP-01/01S (ESP8266) irrigation-pump relay node — v1
; Board: AI-Thinker ESP-01S (ESP8266EX, 1 MB flash).
;
; A drop-in replacement for the ESP32 ../pump-zone controller. Same role in the
; topology (joins MJU-SmartFarm-AP-II as a STA, serves POST/GET /api/v1/relay to
; switch the pump), same DEVICE_ID ("pump_zone_01"), but a full rewrite onto the
; Arduino/ESP8266 stack because ESP-IDF has no ESP8266 target. See README.md.

[env:esp01_1m]
platform = espressif8266
framework = arduino
board = esp01_1m           ; ESP-01S = 1 MB flash (use 'esp01' only for a 512K original ESP-01)
monitor_speed = 115200
upload_speed = 460800    ; fast now that the jig connects; drop to 115200/57600 if uploads get flaky

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    ; Prefer higher-bandwidth lwIP; fine for this tiny server and helps OTA.
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH

; --- OTA uploads (after the first wired flash) ---
; Wired flash is the default (USB-serial adapter, GPIO0 -> GND for download mode).
; Once the firmware with ArduinoOTA is running, uncomment and set the device IP to
; push updates over WiFi instead of re-jigging the ESP-01:
;   upload_protocol = espota
;   upload_port = 192.168.0.4          ; the pump node's reserved IP
;   upload_flags = --auth=change-me-ota ; must match OTA_PASSWORD in secrets.h

; pump-zone — ESP-WROOM-32 irrigation pump control node — v1
; Board: generic ESP32 Dev Module (ESP-WROOM-32 / ESP32-D0WDQ6).
; A stripped, modernized PlatformIO/ESP-IDF port of ../esp-idf-iot/web-server,
; keeping ONLY relay (pump) switching + RGB LED status. Joins WiFi as a STA and
; runs an HTTP server to toggle the pump relay. See README.md for details.

; env:esp32dev — ESP-WROOM-32 pump node, ESP-IDF via pioarduino (IDF 5.3.x).
; We use the pioarduino fork (not the stock espressif32 platform) to stay on the
; same modern IDF baseline as the sibling projects. Tag 53.03.13 == Arduino core
; 3.1.3 based on IDF 5.3.2.
[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32.git#53.03.13
framework = espidf
board = esp32dev
monitor_speed = 115200
board_build.flash_size = 4MB
; sdkconfig.defaults is picked up automatically
